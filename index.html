<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Braga</title>

<style>
    body{
        margin:0;
        background:#071225;
    }
</style>

<script>
(function () {
    const userAgent = navigator.userAgent.toLowerCase();

    const isIphone = /iphone|ipad|ipod/.test(userAgent);
    const isAndroid = /android/.test(userAgent);

    // Pequeno delay para evitar bugs em alguns browsers
    setTimeout(() => {
        if (isIphone) {
            window.location.replace("Gestao-Iphone/");
        } 
        else if (isAndroid) {
            window.location.replace("Gestao-Android/");
        } 
        else {
            window.location.replace("Gestao-Tablet-PC/");
        }
    }, 100);
})();
</script>

</head>

<body>
</body>
</html>

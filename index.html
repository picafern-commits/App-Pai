// DEBUG + FORCE LOAD BACKUPS FIX
document.addEventListener('DOMContentLoaded', ()=>{
  const btn = document.getElementById('loadFirebaseBackupsBtn');
  if(btn){
    btn.onclick = async ()=>{
      alert('Botão backups clicado!');
      if(typeof window.loadFirebaseBackups === 'function'){
        try{
          await window.loadFirebaseBackups();
        }catch(e){
          alert('Erro: ' + e.message);
        }
      }else{
        alert('Função loadFirebaseBackups NÃO existe');
      }
    };
  }
});

</script>

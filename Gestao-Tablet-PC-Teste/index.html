
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:#0b0f1a;color:white;font-family:sans-serif}

/* TOP ENV BAR */
.env-topbar{
  position:sticky;
  top:0;
  z-index:999;
  width:100%;
  text-align:center;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  padding:6px 12px;
  backdrop-filter:blur(8px);
}
.env-test{
  background: linear-gradient(90deg, rgba(239,68,68,.22), rgba(249,115,22,.18));
  color:#fecaca;
  border-bottom:1px solid rgba(239,68,68,.25);
}

/* sidebar */
.sidebar{
  width:220px;
  background:#0e1424;
  padding:20px;
  position:fixed;
  top:32px;
  bottom:0;
}
.app-title{
  font-weight:700;
  margin-bottom:10px;
}
.badge{
  font-size:10px;
  background:rgba(239,68,68,.2);
  padding:4px 8px;
  border-radius:999px;
  margin-left:8px;
}

/* content */
.content{
  margin-left:240px;
  padding:40px;
}
input{padding:10px;border-radius:8px;border:none;width:300px}
</style>
</head>

<body>

<div class="env-topbar env-test">AMBIENTE DE TESTE</div>

<div class="sidebar">
  <div class="app-title">
    Jorge Torneiro <span class="badge">TESTE</span>
  </div>
  <div>Dashboard</div>
  <div>Clientes</div>
  <div>Configurações</div>
</div>

<div class="content">
  <h1>Dashboard</h1>
  <input placeholder="Agora funciona sem bugs">
</div>

</body>
</html>
